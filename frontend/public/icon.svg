<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00F0C8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00DCB4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C8A0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#darkGrad)"/>
  
  <!-- Small diamond accent at top -->
  <polygon points="256,80 268,92 256,104 244,92" fill="url(#tealGrad)" opacity="0.9"/>
  
  <!-- Main A letter - left stroke -->
  <path d="M190,420 L240,148 L252,148 L260,168" 
        fill="none" stroke="url(#tealGrad)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Main A letter - right stroke -->
  <path d="M322,420 L272,148 L260,168" 
        fill="none" stroke="url(#tealGrad)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- A letter - crossbar -->
  <rect x="213" y="290" width="102" height="32" rx="4" fill="url(#tealGrad)"/>
</svg>
